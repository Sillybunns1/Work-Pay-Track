<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Offline-capable pay tracker with login, register, shifts, lunch breaks, pay periods, and paydays." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Pay Tracker PWA</title>
</head>
<body>
  <main class="app-shell">
    <section class="card" id="authBox">
      <h1>Pay Tracker</h1>
      <p class="muted">Login or register to track your shifts on this device.</p>

      <label for="username">Username</label>
      <input id="username" autocomplete="username" placeholder="Username" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Password" />

      <div class="button-row">
        <button id="loginBtn" type="button">Login</button>
        <button id="registerBtn" type="button" class="secondary">Register</button>
      </div>
      <p id="authMessage" class="message" role="status"></p>
    </section>

    <section class="card hidden" id="appBox">
      <div class="topbar">
        <div>
          <h1>Pay Tracker</h1>
          <p class="muted" id="welcomeText"></p>
        </div>
        <button id="logoutBtn" type="button" class="danger small">Logout</button>
      </div>

      <div class="notice" id="installNotice">
        PWA ready. Use your browser menu to install it after opening with a local server or GitHub Pages.
      </div>

      <form id="shiftForm" class="grid-form">
        <label>Date
          <input type="date" id="date" required />
        </label>
        <label>Start
          <input type="time" id="start" required />
        </label>
        <label>End
          <input type="time" id="end" required />
        </label>
        <label>Lunch Start
          <input type="time" id="lunchStart" />
        </label>
        <label>Lunch End
          <input type="time" id="lunchEnd" />
        </label>
        <button type="submit" class="full">Add Shift</button>
      </form>

      <section class="summary-grid">
        <div class="summary-card">
          <span>Current Pay Period</span>
          <strong id="periodLabel">—</strong>
        </div>
        <div class="summary-card">
          <span>Next Payday</span>
          <strong id="paydayLabel">—</strong>
        </div>
        <div class="summary-card">
          <span>Total Hours</span>
          <strong id="totalHours">0.00</strong>
        </div>
        <div class="summary-card">
          <span>Estimated Pay</span>
          <strong id="totalPay">$0.00</strong>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Shifts</h2>
          <button id="clearBtn" type="button" class="danger small">Clear All</button>
        </div>
        <div id="shiftList" class="shift-list"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
